name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Go
        # actions/setup-go v5.5.0
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Run gate
        run: just gate
